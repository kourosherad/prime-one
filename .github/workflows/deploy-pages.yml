name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the official Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install dev deps (tailwindcss) so we can compile the stylesheet.
      - name: Install dependencies
        run: npm ci

      # Compile Tailwind → public/assets/dist/tailwind.css. This file is
      # gitignored locally, so it must be generated in CI before building.
      - name: Build CSS
        run: npm run build:css

      # Build the static site: copies public/ → dist-pages/, rewrites asset
      # paths to /prime-one/, enables demo mode. No deps needed (pure Node).
      - name: Build static site
        env:
          # Derive base path from the repo name so it works for any project page.
          BASE_PATH: /${{ github.event.repository.name }}/
        run: node scripts/build-pages.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
