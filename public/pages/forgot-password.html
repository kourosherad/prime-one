<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فراموشی رمز — Prime One</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link rel="stylesheet" href="/assets/dist/tailwind.css" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
  <div id="header"></div>
  <main class="pt-16 min-h-screen grid place-items-center px-4">
    <div class="w-full max-w-md glass p-8 my-10">
      <h1 class="text-2xl font-extrabold mb-2">بازیابی رمز عبور</h1>
      <p class="text-sm text-mist mb-6">ایمیل خود را وارد کنید؛ لینک بازیابی ارسال می‌شود.</p>
      <form id="forgot-form" class="space-y-4">
        <input name="email" type="email" class="input" placeholder="ایمیل شما" required />
        <button class="btn-primary w-full !py-3" type="submit">ارسال لینک بازیابی</button>
      </form>
      <div id="form-msg" class="text-sm text-center mt-4"></div>
      <p class="text-center text-sm text-mist mt-4"><a href="/pages/login.html" class="text-primary hover:underline">بازگشت به ورود</a></p>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module">
    import { api } from '/assets/js/api.js';
    const form = document.getElementById('forgot-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const { email } = Object.fromEntries(new FormData(form));
      const btn = form.querySelector('button');
      btn.disabled = true;
      try {
        await api.post('/api/auth/forgot-password', { email });
        document.getElementById('form-msg').innerHTML = '<span class="text-primary"><i class="fa-solid fa-circle-check"></i> در صورت وجود حساب، لینک بازیابی ارسال شد.</span>';
      } catch (err) {
        document.getElementById('form-msg').innerHTML = `<span class="text-red-500">${err.message}</span>`;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
