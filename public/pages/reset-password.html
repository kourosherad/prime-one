<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تنظیم رمز جدید — Prime One</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link rel="stylesheet" href="/assets/dist/tailwind.css" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
  <div id="header"></div>
  <main class="pt-16 min-h-screen grid place-items-center px-4">
    <div class="w-full max-w-md glass p-8 my-10">
      <h1 class="text-2xl font-extrabold mb-2">رمز عبور جدید</h1>
      <p class="text-sm text-mist mb-6">رمز عبور جدید خود را وارد کنید.</p>
      <form id="reset-form" class="space-y-4">
        <input name="password" type="password" class="input" placeholder="رمز جدید (حداقل ۸ کاراکتر)" required minlength="8" />
        <button class="btn-primary w-full !py-3" type="submit">تغییر رمز</button>
      </form>
      <div id="form-msg" class="text-sm text-center mt-4"></div>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module">
    import { api } from '/assets/js/api.js';
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const form = document.getElementById('reset-form');
    if (!token) {
      document.getElementById('form-msg').innerHTML = '<span class="text-red-500">لینک بازیابی نامعتبر است.</span>';
      form.querySelector('button').disabled = true;
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const { password } = Object.fromEntries(new FormData(form));
      const btn = form.querySelector('button');
      btn.disabled = true;
      try {
        await api.post('/api/auth/reset-password', { token, password });
        document.getElementById('form-msg').innerHTML = '<span class="text-primary"><i class="fa-solid fa-circle-check"></i> رمز تغییر کرد. در حال انتقال به ورود...</span>';
        setTimeout(() => (location.href = '/pages/login.html'), 1800);
      } catch (err) {
        document.getElementById('form-msg').innerHTML = `<span class="text-red-500">${err.message}</span>`;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
