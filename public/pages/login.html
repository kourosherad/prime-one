<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ورود — Prime One</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link rel="stylesheet" href="/assets/dist/tailwind.css" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
  <div id="header"></div>
  <main class="pt-16 min-h-screen grid place-items-center px-4">
    <div class="w-full max-w-md glass p-8 my-10">
      <div class="text-center mb-6">
        <span class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-gradient-brand text-ink font-extrabold text-lg shadow-glow">P1</span>
        <h1 class="text-2xl font-extrabold mt-3">ورود به حساب</h1>
        <p class="text-sm text-mist mt-1">خوش آمدید! لطفاً وارد شوید.</p>
      </div>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="label">ایمیل</label>
          <input name="email" type="email" class="input" placeholder="ایمیل شما" required />
        </div>
        <div>
          <label class="label">رمز عبور</label>
          <div class="relative">
            <input name="password" type="password" id="pwd" class="input !pl-10" placeholder="••••••••" required />
            <button type="button" id="toggle-pwd" class="absolute top-1/2 -translate-y-1/2 left-3 text-mist text-sm" tabindex="-1"><i class="fa-solid fa-eye"></i></button>
          </div>
        </div>
        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="remember" class="accent-[#FFB300] w-4 h-4" /> مرا به خاطر بسپار</label>
          <a href="/pages/forgot-password.html" class="text-primary hover:underline">رمز را فراموش کرده‌اید؟</a>
        </div>
        <button class="btn-primary w-full !py-3" type="submit">ورود</button>
      </form>
      <div id="form-msg" class="text-sm text-center mt-4"></div>
      <p class="text-center text-sm text-mist mt-4">حساب ندارید؟ <a href="/pages/register.html" class="text-primary hover:underline">ثبت‌نام کنید</a></p>

      <div class="mt-6 p-3 rounded-xl bg-primary/5 border border-primary/20 text-xs text-mist leading-7">
        <strong>حساب نمونه:</strong><br>
        ادمین: admin@primeone.local / Admin@123456<br>
        مشتری: customer@primeone.local / Customer@123456
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module" src="/assets/js/pages/login.js"></script>
</body>
</html>
